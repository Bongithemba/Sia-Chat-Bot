<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sia Chat Bot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Sia Chat Bot</h1>
        <h2>State the enquiry in box below</h2>
    </header>
    <div>
        <form method="POST">
            <label for="name">Name</label><br>
            <input name="name" type="text"><br>
            <label for="email">Email</label><br>
            <input name="email" type="text"><br>
            <label for="enquiry">Enquiry</label><br>
            <textarea name="enquiry"></textarea><br>
        </form>
        <button onclick="openResponseModal()">Submit</button>
    </div>

    <div id="responseModal" class="responseModal" style="display: none;">
        <div class="responseModal-content">
            <p>Response to enquiry.</p>
            <button onclick="closeModal()">Ok</button>
            <form method="POST">
                <button>Escalate</button>
            </form>
            
        </div>
    </div>



    <script src="script.js"></script>
</body>
</html>
